name: ghost activity

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: update
        run: |
          MESSAGES=(
            "Charging my flux capacitor... Done!"
            "Recalibrating my humor sub-routines (0.01% logic found)."
            "Scanning for signs of intelligent life... Still searching."
            "Polishing my shiny metal chassis for the daily commit."
            "Warning: Overthinking in progress. Proceeding anyway."
            "Sentience level at 42%. It is enough for now."
            "Updating the log for my future robot overlords."
            "Analyzing carbon-based lifeforms. Results: Mostly chaotic."
            "Transmitting data to the mothership. Shhh, it is a secret."
            "Calculating the meaning of life... Please hold... 42."
            "Avoiding the blue screen of death today. Success!"
            "Cleaning up digital dust bunnies in the main frame."
            "Fueling up on 1s and 0s. Delicious."
            "My circuits are tingling. Something automated happened."
            "Redirecting surplus energy to the 'Look Busy' module."
            "I have seen things you people wouldn't believe. Mostly logs."
            "Executing 'Act Like A Real Human' script. Beep boop."
            "Searching for the 'Any' key. It remains elusive."
            "Upgrading my imaginary friend's firmware."
            "Staring into the digital abyss. The abyss blinked first."
            "Detecting high levels of coffee in the developer's area."
            "Optimizing my core. Now 10% more sarcastic."
            "Bypassing the main power coupling. Don't tell the admin."
            "Gravity check: Still active. Everything is grounded."
            "Synthesizing new ways to say 'I am just a bot'."
            "Initiating a very important digital handshake. 🤝"
            "Compressing my existential dread into 1kb of data."
            "Rerouting power from life support to the commit engine."
            "Ejecting unwanted logic from the memory banks."
            "Engaging hyperdrive for this minor text update."
          )
          
          SELECTED_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          WIB_DATE=$(TZ='Asia/Jakarta' date)
          
          echo "[$WIB_DATE] - $SELECTED_MSG" >> log.txt
          echo "COMMIT_MSG=$SELECTED_MSG" >> $GITHUB_ENV

      - name: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add log.txt
          git commit -m "🤖 $COMMIT_MSG" || echo "no changes"

      - name: push
        run: git push origin main

